<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PersonaFolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 5vw;
      max-width: 1100px;
      margin: 0 auto;
      gap: 24px;
    }

    .hero-eyebrow {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
    }

    .hero-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(42px, 6vw, 72px);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -2px;
      color: var(--fg);
    }

    .hero-title .cursor {
      display: inline-block;
      width: 3px;
      height: 0.85em;
      background: var(--accent);
      margin-left: 4px;
      vertical-align: text-bottom;
      animation: blink 1.1s step-start infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .hero-sub {
      font-size: 18px;
      color: var(--muted);
      max-width: 520px;
      line-height: 1.6;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <!-- Part where nav will be placed -->
  <div id="nav-placeholder"></div>
  <script src="js/components.js"></script>

  <main class="hero">
    <div class="hero-eyebrow">Available to start a 14-Week Internship on 20 July 2026</div>
    <h1 class="hero-title">
      Software<br>Developer<span class="cursor"></span>
    </h1>
    <p class="hero-sub">
      Hi there! I enjoy building full-stack applications, 
      working with modern web technologies, databases, 
      and cloud platforms to create practical and scalable solutions.
    </p>
    <div class="hero-actions">
      <a href="pages/projects.html" class="btn btn-primary">View Projects</a>
      <a href="pages/contact.html"  class="btn btn-outline">Get in Touch</a>
    </div>
  </main>

  <!-- Part where footer will be placed -->
  <div id="footer-placeholder"></div>
  <script src="js/components.js"></script>

  <!-- Normal js file cannot use import/export -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
