<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .skill-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }

    .skill-category {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
    }

    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .skill-tag {
      font-size: 13px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      color: var(--fg);
    }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>
  
  <main class="page-wrapper">
    <span class="section-label">Skills</span>
    <h1 class="section-title">What I work with</h1>

    <p class="section-desc">A mix of languages, frameworks, and tools I use day-to-day.</p>

    <div id="skillsContainer" class="skills-grid">

      <!-- Fetch from Firestore -->

    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="../js/components.js"></script>

  <script type="module" src="../js/main.js"></script>
  <script type="module" src="../js/display-skills.js"></script>
</body>
</html>
