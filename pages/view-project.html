<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Project | PersonaFolio</title>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/style.css">

    <style>

        .back-link{
            display:inline-flex;
            align-items:center;
            gap:8px;
            margin-bottom:32px;
            color:var(--muted);
            text-decoration:none;
            font-size:14px;
            transition:.2s;
        }

        .back-link:hover{
            color:var(--fg);
        }

        .project-type{
            font-size:12px;
            font-weight:600;
            letter-spacing:2px;
            text-transform:uppercase;
            color:var(--accent);
            margin-bottom:10px;
        }

        .project-title{
            font-family:'Space Grotesk',sans-serif;
            font-size:clamp(32px,5vw,48px);
            font-weight:700;
            line-height:1.1;
            margin-bottom:18px;
        }

        .project-description{
            color:var(--muted);
            max-width:760px;
            margin-bottom:32px;
        }

        .hero-image{
            width:100%;
            height:420px;
            border-radius:12px;
            background:#EFF6FF center/cover no-repeat;
            border:1px solid var(--border);
            margin-bottom:40px;
        }

        .tag-list{
            display:flex;
            flex-wrap:wrap;
            gap:8px;
            margin-bottom:32px;
        }

        .tag{
            font-size:13px;
            border:1px solid var(--border);
            border-radius:6px;
            padding:5px 10px;
            color:var(--muted);
            background:var(--card-bg);
        }

        .links{
            display:flex;
            flex-wrap:wrap;
            gap:12px;
            margin-bottom:48px;
        }

        .links a{
            text-decoration:none;
        }

        .section-card{
            border:1px solid var(--border);
            border-radius:12px;
            padding:28px;
            margin-bottom:28px;
            background:var(--card-bg);
        }

        .card-title{
            font-family:'Space Grotesk',sans-serif;
            font-size:22px;
            margin-bottom:20px;
        }

        .info-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:18px;
        }

        .info-item{
            display:flex;
            flex-direction:column;
            gap:6px;
        }

        .info-label{
            font-size:13px;
            color:var(--muted);
        }

        .info-value{
            font-weight:500;
        }

        .feature-list{
            display:grid;
            gap:12px;
        }

        .feature-item{
            display:flex;
            align-items:center;
            gap:10px;
        }

        .feature-icon{
            color:var(--accent);
            font-weight:bold;
        }

        .gallery-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
            gap:18px;
        }

        .gallery-item{
            border:1px solid var(--border);
            border-radius:10px;
            overflow:hidden;
            background:var(--bg);
        }

        .gallery-item img{
            width:100%;
            display:block;
        }

        @media(max-width:640px){

            .hero-image{
                height:240px;
            }

        }

    </style>

</head>

<body>

    <div id="nav-placeholder"></div>

    <main class="page-wrapper">

        <div id="projectContainer">

            <!-- Loaded by view-project.js -->

        </div>

    </main>

    <div id="footer-placeholder"></div>

    <script src="../js/components.js"></script>

    <script type="module" src="../js/main.js"></script>

    <script type="module" src="../js/view-project.js"></script>

</body>

</html>
