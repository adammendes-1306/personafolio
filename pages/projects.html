<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Alex</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .project-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }

    .project-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .project-img {
      width:100%;
      height:180px;
      background:#EFF6FF;
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
    }

    .project-body { padding: 20px; }

    .project-type {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .project-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .project-desc {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .project-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .stack-tag {
      font-size: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      color: var(--muted);
    }

    .project-links { display: flex; gap: 12px; }

    .project-link {
      font-size: 13px;
      font-weight: 500;
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2px;
      transition: border-color 0.15s, color 0.15s;
    }

    .project-link:hover { color: var(--accent); border-color: var(--accent); }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>
  <script src="js/components.js"></script>

  <main class="page-wrapper">
    <span class="section-label">Projects</span>
    <h1 class="section-title">Selected work</h1>
    <p class="section-desc">A handful of projects I am proud of. Each one taught me something new.</p>

    <div id="projectsContainer" class="projects-grid">

       <!-- Projects loaded from Firestore -->

    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="js/components.js"></script>

  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/display-projects.js"></script>
</body>
</html>
